<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
 <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bravexa — Instant Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
   <div class="sidebar" id="sidebar">
     <div class="sidebar-header">
  <div class="sidebar-brand">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon -->
  <path 
    d="M12 2L20 7V17L12 22L4 17V7L12 2Z" 
    stroke="white" 
    stroke-width="1.5" 
    stroke-linejoin="round"
  />
  
  <!-- Lightning -->
  <path 
    d="M13 6L8 13H12L11 18L16 11H12L13 6Z" 
    fill="white"
  />
</svg>
    <span>Bravexa</span>
  </div>

  <button id="closeSidebarBtn" class="icon-btn" title="Close">
    <!-- door / exit style icon -->
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path fill="currentColor" d="M10 17l5-5-5-5v10zm-7 4V3c0-1.1.9-2 2-2h10v2H5v18h10v2H5c-1.1 0-2-.9-2-2z"/>
    </svg>
  </button>
</div>
    <a href="dashboard.html" class="new-chat">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
    <!-- chat bubble -->
    <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linejoin="round"/>
      
    <!-- plus icon -->
    <path d="M12 9v6M9 12h6"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"/>
  </svg>

  <span>New Chat</span>
</a>
  <p>Recents</p>
  <div id="historyList" class="history-list"></div>
</div>

  <!-- Header / Navbar -->
  <header class="header">
      <button id="menuToggle" class="menu-btn">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
    <path d="M4 6H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M4 12H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M4 18H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
</button>
      <h4>Bravexa<span class="grey">V1</span></h4>
      <button id="editLogoBtn" class="edit-btn" title="Edit name">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
  <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75L3 17.25z"
        stroke="white"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
        
  <path d="M14.06 4.19l3.75 3.75"
        stroke="white"
        stroke-width="1.8"
        stroke-linecap="round"/>
</svg>
</button>
  </header>
  <div class="hero">
    <h1>Good morning, <span id="username">User</span></h1>
  <div class="suggestions">
  <button id="codeBtn">Fix code</button>
  <button id="websiteBtn">Create website</button>
  <button id="writeBtn">Write something </button>
</div>
  </div>

  <!-- Chat Window -->
  <div class="chat-window" style="display:none;">
  </div>

  <!-- Input Box -->
  <!-- Bravexa AI Chat Input -->
<div class="input-box">
  <div id="previewContainer" class="preview-container"></div>
  <textarea placeholder="Write something for me" class="chatbox" id="userinput"></textarea>

  <div class="bottom-row">
    <div class="left-section">
      <button class="plus-btn" id="plusBtn" style="display: none;">+</button>
      <div class="upload-dropdown" id="uploadDropdown" style="display:none;">
        <ul>
          <li><label for="imageUpload">📷 Image</label><input type="file" id="imageUpload" accept="image/*" hidden></li>
          <li><label for="fileUpload">📄 File</label><input type="file" id="fileUpload" hidden></li>
          <li><button id="screenshotBtn">🖼️ Screenshot</button></li>
        </ul>
      </div>
    </div>


    <div class="right-section">
      <i class="voice-icon" title="Voice">
        <svg viewBox="0 0 24 24" width="26" height="26" xmlns="http://www.w3.org/2000/svg">
          <path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zM11 20h2v2h-2z"/>
        </svg>
      </i>
      <button class="send-btn">↑</button>
    </div>
  </div>
</div>

  <!-- Footer -->
  <div class="footer">
     Quiet space • Fast • Private
  </div>

  <script src="script.js"></script>
</body>

</html>
